services:
  backend:
    build:
      context: backend
      dockerfile: Dockerfile.prod
    image: agentos-__AGENT_ID__-backend:prod
    environment:
      - DEBUG=False
      - AGENTOS_URL=${AGENTOS_URL:-http://host.docker.internal:8088}
      - AGENTOS_KEY=${AGENTOS_KEY}
      - AGENTOS_OIDC_ISSUER=${AGENTOS_OIDC_ISSUER}
      - AGENTOS_OIDC_PUBLIC_ISSUER=${AGENTOS_OIDC_PUBLIC_ISSUER}
      - AGENTOS_CLIENT_ID=${AGENTOS_CLIENT_ID}
      - AGENTOS_CLIENT_SECRET=${AGENTOS_CLIENT_SECRET}
      - AGENTOS_REDIRECT_URI=${AGENTOS_REDIRECT_URI}
      - AGENTOS_LOGIN_REDIRECT=${AGENTOS_LOGIN_REDIRECT:-/}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-True}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-True}
      - AGENTOS_INSECURE_TLS=${AGENTOS_INSECURE_TLS:-1}
    volumes:
      - __PKG___data:/data
    restart: always

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
    image: agentos-__AGENT_ID__-frontend:prod
    ports:
      - "${AGENT_PORT:-3001}:443"
    volumes:
      - ${CERT_DIR:-C:/agentos-certs}:/certs:ro
    depends_on:
      - backend
    restart: always

  connector:
    image: agentos-__AGENT_ID__-backend:prod
    command: ["python", "manage.py", "connect_platform"]
    environment:
      - AGENTOS_UI_URL=${AGENTOS_UI_URL:-https://localhost:3001}
      - AGENTOS_URL=${AGENTOS_URL:-http://host.docker.internal:8088}
      - AGENTOS_KEY=${AGENTOS_KEY}
      - AGENTOS_AGENT_ID=${AGENTOS_AGENT_ID}
      - AGENTOS_INSECURE_TLS=${AGENTOS_INSECURE_TLS:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - __PKG___data:/data
    depends_on:
      - backend
    restart: always

volumes:
  __PKG___data:
